// ─── SYNTAX HIGHLIGHTING ───
function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function highlight(code,lang){
  if(!code)return "";
  return code.split("\n").map(line=>{
    const trimmed=line.trimStart();
    if(trimmed.startsWith("#")||trimmed.startsWith("//")||trimmed.startsWith("--")||trimmed.startsWith(";")){
      return `<span style="color:${lang.dimText};font-style:italic;opacity:0.8">${escHtml(line)}</span>`;
    }
    let result="",i=0;
    while(i<line.length){
      if(line[i]==='"'||line[i]==="'"){
        const q=line[i];let j=i+1;
        while(j<line.length&&line[j]!==q){if(line[j]==="\\")j++;j++;}
        result+=`<span style="color:${lang.secondary}">${escHtml(line.slice(i,j+1))}</span>`;
        i=j+1;continue;
      }
      if(/[0-9]/.test(line[i])&&(i===0||/\W/.test(line[i-1]))){
        let j=i;while(j<line.length&&/[0-9._xXbBoO]/.test(line[j]))j++;
        result+=`<span style="color:${lang.accent}">${escHtml(line.slice(i,j))}</span>`;
        i=j;continue;
      }
      if(/[a-zA-Z_]/.test(line[i])){
        let j=i;while(j<line.length&&/[a-zA-Z0-9_!?]/.test(line[j]))j++;
        const word=line.slice(i,j);
        if(lang.keywords.includes(word)){
          result+=`<span style="color:${lang.primary};font-weight:600;text-shadow:0 0 8px ${lang.primary}66">${escHtml(word)}</span>`;
        } else if(line[j]==="("||line[j]==="!"){
          result+=`<span style="color:#ffd080">${escHtml(word)}</span>`;
        } else if(word[0]===word[0].toUpperCase()&&word[0]!==word[0].toLowerCase()){
          result+=`<span style="color:${lang.accent}">${escHtml(word)}</span>`;
        } else {
          result+=`<span style="color:${lang.textColor}">${escHtml(word)}</span>`;
        }
        i=j;continue;
      }
      const ch=line[i];
      if("{}()[]".includes(ch))result+=`<span style="color:#aaa8">${escHtml(ch)}</span>`;
      else if(":=<>!|&+-*/%^;,.@~".includes(ch))result+=`<span style="color:${lang.accent}88">${escHtml(ch)}</span>`;
      else result+=escHtml(ch);
      i++;
    }
    return result;
  }).join("\n");
}

// ─── DIFF ───
function computeDiff(oldCode,newCode){
  const a=(oldCode||"").split("\n"),b=(newCode||"").split("\n");
  const dp=Array.from({length:a.length+1},()=>new Array(b.length+1).fill(0));
  for(let i=a.length-1;i>=0;i--)for(let j=b.length-1;j>=0;j--)
    dp[i][j]=a[i]===b[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);
  const diff=[];let i=0,j=0;
  while(i<a.length||j<b.length){
    if(i<a.length&&j<b.length&&a[i]===b[j]){diff.push({type:"same",text:a[i]});i++;j++;}
    else if(j<b.length&&(i>=a.length||dp[i][j+1]>=(i+1<=a.length?dp[i+1][j]:0))){diff.push({type:"add",text:b[j]});j++;}
    else{diff.push({type:"del",text:a[i]});i++;}
  }
  return diff;
}

// ─── OLLAMA API ───
async function callOllama(userPrompt,systemPrompt="",model="codestral:22b"){
  const resp=await fetch("http://localhost:11434/v1/chat/completions",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model,messages:[...(systemPrompt?[{role:"system",content:systemPrompt}]:[]),{role:"user",content:userPrompt}],
      stream:false,temperature:0.1,
    }),
  });
  if(!resp.ok){const e=await resp.text().catch(()=>resp.statusText);throw new Error(`Ollama ${resp.status}: ${e}`);}
  const data=await resp.json();
  const text=data.choices?.[0]?.message?.content?.trim()||"";
  if(!text)throw new Error("Empty response");
  return text;
}

function extractCode(t){const m=t.match(/```[a-zA-Z]*\n?([\s\S]*?)```/);return m?m[1].trim():t.trim();}

async function translateCode(src,srcLang,tgtLang,model){
  return extractCode(await callOllama(
    `Translate this ${srcLang} code to ${tgtLang}. Return ONLY the translated code, no markdown, no explanation.\n\n${src}`,
    `You are an expert polyglot programmer. Output only raw source code, nothing else.`,model));
}
async function refineCode(code,lang,mode,model){
  const instr={
    efficiency:`Rewrite this ${lang} code to be maximally memory-efficient and computationally lean.`,
    performance:`Rewrite this ${lang} code for the lowest possible runtime complexity using memoization or better algorithms.`,
    readability:`Rewrite this ${lang} code to be maximally readable: clear names, brief inline comments, named steps.`,
    oneliners:`Rewrite this ${lang} code using the most concise, expressive ${lang} idioms — one-liners, functional chains, comprehensions.`,
  };
  return extractCode(await callOllama(
    `${instr[mode]} Return ONLY the improved code, no markdown, no explanation.\n\nCode:\n${code}`,
    `You are an expert ${lang} programmer. Output only raw source code, nothing else.`,model));
}
async function scoreElegance(code,lang,model){
  const result=await callOllama(
    `Score this ${lang} code on elegance from 0 to 100.\nCriteria: idiomatic language use, conciseness, good naming.\nRespond ONLY with raw JSON on one line:\n{"score":75,"label":"Brief reason under twelve words"}\n\nCode:\n${code}`,
    `You are an expert ${lang} programmer. Respond ONLY with a single-line raw JSON object.`,model);
  try{
    const m=result.match(/\{[\s\S]*?"score"\s*:\s*\d+[\s\S]*?\}/);
    if(!m)throw new Error("no json");
    const p=JSON.parse(m[0]);
    p.score=Math.max(0,Math.min(100,Math.round(Number(p.score))));
    return p;
  }catch{return{score:50,label:"Score parse error."};}
}
async function generateCode(desc,langId,model){
  return extractCode(await callOllama(
    `Write ${langId} code that does the following: ${desc}\n\nReturn ONLY the code, no markdown, no explanation.`,
    `You are an expert ${langId} programmer. Write clean, working code. Output only raw source code.`,model));
}
async function commentCode(code,langId,model){
  return extractCode(await callOllama(
    `Add clear, helpful inline comments to every meaningful line or block of this ${langId} code. Explain WHAT each part does and WHY. Keep the code exactly the same — only add or improve comments. Return ONLY the commented code, no markdown, no explanation.\n\nCode:\n${code}`,
    `You are an expert ${langId} programmer and technical writer. Add comments that help a beginner understand the code. Output only raw source code with comments added.`,model));
}
async function explainCode(code,langId,model){
  return await callOllama(
    `You are a patient programming teacher. Explain this ${langId} code to a beginner step by step.\n\nGo through the code section by section. For each section:\n1. Quote the exact code snippet briefly\n2. Explain in plain English what it does and WHY it works\n3. Mention any important concepts\n\nBe thorough but clear. Use analogies. Format each section starting with "## " followed by a descriptive title.\n\nCode:\n\`\`\`${langId}\n${code}\n\`\`\``,
    `You are a patient, enthusiastic programming teacher. Explain clearly to beginners. Format sections with ## headings.`,model);
}

function parseExplanation(text){
  const sections=text.split(/\n##\s+/).filter(Boolean);
  if(sections.length<=1)
    return text.split(/\n\n+/).filter(s=>s.trim()).map((s,i)=>({title:i===0?"Overview":`Part ${i+1}`,body:s.trim()}));
  return sections.map(s=>{const lines=s.split("\n");return{title:lines[0].trim(),body:lines.slice(1).join("\n").trim()};});
}

function FormatBody({text,lang}){
  const parts=text.split(/(`[^`]+`)/g);
  return React.createElement(React.Fragment,null,...parts.map((p,i)=>
    p.startsWith("`")&&p.endsWith("`")
      ? React.createElement("code",{key:i,style:{background:`${lang.primary}18`,border:`1px solid ${lang.primary}33`,borderRadius:"3px",padding:"1px 5px",color:lang.primary,fontSize:"11px",fontFamily:"'JetBrains Mono',monospace"}},p.slice(1,-1))
      : React.createElement("span",{key:i},p)
  ));
}

// ─── CODE EDITOR ───
function CodeEditor({lang,value,onChange,placeholder,diffBase,showDiff}){
  const taRef=useRef(null),preRef=useRef(null),lnRef=useRef(null);
  const sync=()=>{
    if(preRef.current&&taRef.current){preRef.current.scrollTop=taRef.current.scrollTop;preRef.current.scrollLeft=taRef.current.scrollLeft;}
    if(lnRef.current&&taRef.current)lnRef.current.scrollTop=taRef.current.scrollTop;
  };
  const display=value||placeholder,lc=display.split("\n").length;
  let html;
  if(showDiff&&diffBase&&value){
    html=computeDiff(diffBase,value).map(({type,text})=>{
      const hl=highlight(text,lang);
      const bg=type==="add"?"#22c55e18":type==="del"?"#ef444418":"transparent";
      const pre=type==="add"?`<span style="color:#22c55e;opacity:.7;user-select:none">+ </span>`:type==="del"?`<span style="color:#ef4444;opacity:.7;user-select:none">- </span>`:`<span style="opacity:0;user-select:none">  </span>`;
      return `<span style="display:block;background:${bg}">${pre}${hl}</span>`;
    }).join("\n");
  } else {
    html=value?highlight(value,lang):`<span style="color:${lang.dimText};opacity:0.45">${escHtml(placeholder)}</span>`;
  }
  return (
    <div style={{position:"relative",flex:1,overflow:"hidden",display:"flex",minHeight:0}}>
      <div ref={lnRef} aria-hidden="true" style={{flexShrink:0,width:"36px",padding:"14px 4px",fontFamily:"'JetBrains Mono',monospace",fontSize:"11px",lineHeight:"1.8",color:lang.dimText,opacity:0.5,pointerEvents:"none",textAlign:"right",userSelect:"none",borderRight:`1px solid ${lang.border}`,background:`${lang.bg}88`,overflowY:"hidden"}}>
        {Array.from({length:lc},(_,i)=><div key={i}>{i+1}</div>)}
      </div>
      <div style={{position:"relative",flex:1,overflow:"hidden",minHeight:0}}>
        <pre ref={preRef} aria-hidden="true" style={{position:"absolute",inset:0,margin:0,padding:"14px",fontFamily:"'JetBrains Mono',monospace",fontSize:"13px",lineHeight:"1.8",whiteSpace:"pre",overflow:"hidden",pointerEvents:"none",color:lang.textColor,background:"transparent",zIndex:1}} dangerouslySetInnerHTML={{__html:html+"\n"}}/>
        <textarea ref={taRef} value={value} onChange={e=>onChange(e.target.value)} onScroll={sync} spellCheck={false} autoCorrect="off" autoCapitalize="off"
          style={{position:"absolute",inset:0,width:"100%",height:"100%",margin:0,padding:"14px",fontFamily:"'JetBrains Mono',monospace",fontSize:"13px",lineHeight:"1.8",background:"transparent",border:"none",color:"transparent",caretColor:lang.primary,resize:"none",outline:"none",whiteSpace:"pre",overflowX:"auto",overflowY:"auto",zIndex:2}}/>
      </div>
    </div>
  );
}

      <div style={{display:"flex",alignItems:"center",gap:"8px",flex:1}}>
        <span style={{fontSize:"12px"}}>⟨/⟩</span>
        <span style={{fontFamily:"'Syne',sans-serif",fontSize:"10px",fontWeight:900,letterSpacing:"3px",color:"#333"}}>POLYGLOT</span>
        {model&&<span style={{fontSize:"8px",color:"#22c55e",letterSpacing:"1px",background:"#22c55e11",border:"1px solid #22c55e22",padding:"2px 6px",borderRadius:"3px"}}>⬡ {model}</span>}
      </div>
      <div className="no-drag" style={{display:"flex",gap:"6px"}}>
        {[{label:"−",action:"minimizeWindow",color:"#facc15"},{label:"□",action:"maximizeWindow",color:"#22c55e"},{label:"×",action:"closeWindow",color:"#ef4444"}].map(btn=>(
          <button key={btn.action} onClick={()=>window.electronAPI[btn.action]()} style={{width:"14px",height:"14px",borderRadius:"50%",background:btn.color+"44",border:`1px solid ${btn.color}66`,color:btn.color,fontSize:"8px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}} onMouseEnter={e=>e.currentTarget.style.background=btn.color+"aa"} onMouseLeave={e=>e.currentTarget.style.background=btn.color+"44"}>{btn.label}</button>
        ))}
      </div>
    </div>
  );
}

// ─── MAIN APP ───
function App(){
  const [appState,setAppState]=useState("setup");
  const [activeModel,setActiveModel]=useState("codestral:22b");
  const [showGenerator,setShowGenerator]=useState(false);

  const initObj=()=>Object.fromEntries(LANGUAGES.map(l=>[l.id,""]));
  const [codes,setCodes]=useState(initObj);
  const [prevCodes,setPrevCodes]=useState({});
  const [loading,setLoading]=useState({});
  const [refining,setRefining]=useState({});
  const [scoring,setScoring]=useState({});
  const [explaining,setExplaining]=useState({});
  const [explanations,setExplanations]=useState({});
  const [showExplain,setShowExplain]=useState({});
  const [activeSource,setActiveSource]=useState(null);
  const [activeLangs,setActiveLangs]=useState(["python","ruby","rust","julia"]);
  const [eleganceScores,setEleganceScores]=useState({});
  const [activeMode,setActiveMode]=useState(null);
  const [diffMode,setDiffMode]=useState({});
  const [toasts,setToasts]=useState([]);
  const [copyState,setCopyState]=useState({});

  const isGlobalBusy=
    Object.values(loading).some(Boolean)||
    Object.values(refining).some(Boolean)||
    Object.values(scoring).some(Boolean)||
    Object.values(explaining).some(Boolean);

  const addToast=useCallback((msg,type="success")=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,message:msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),2500);
  },[]);

  const toggleLang=id=>setActiveLangs(prev=>{
    if(prev.includes(id)){if(prev.length<=1)return prev;return prev.filter(l=>l!==id);}
    return LANGUAGES.map(l=>l.id).filter(l=>prev.includes(l)||l===id);
  });

  const handleTranslate=useCallback(async(srcLang)=>{
    let src=codes[srcLang].trim();
    if(!src){src=PLACEHOLDERS[srcLang];setCodes(p=>({...p,[srcLang]:src}));}
    const targets=activeLangs.filter(l=>l!==srcLang);
    setActiveSource(srcLang);
    setLoading(Object.fromEntries(targets.map(t=>[t,true])));
    setEleganceScores({});
    setPrevCodes(p=>({...p,...Object.fromEntries(targets.map(t=>[t,codes[t]]))}));
    setDiffMode({});
    await Promise.all(targets.map(async tgt=>{
      try{const r=await translateCode(src,srcLang,tgt,activeModel);setCodes(p=>({...p,[tgt]:r}));}
      catch(e){setCodes(p=>({...p,[tgt]:`# Error: ${e.message}`}));addToast(`Translation to ${tgt} failed`,"error");}
      finally{setLoading(p=>({...p,[tgt]:false}));}
    }));
    setActiveSource(null);
    addToast(`Translated to ${targets.length} language${targets.length>1?"s":""}!`);
  },[codes,activeLangs,addToast,activeModel]);

  const handleRefine=useCallback(async(langId,mode)=>{
    let code=codes[langId].trim()||PLACEHOLDERS[langId];
    if(!codes[langId].trim())setCodes(p=>({...p,[langId]:code}));
    setPrevCodes(p=>({...p,[langId]:code}));
    setDiffMode(p=>({...p,[langId]:false}));
    setRefining(p=>({...p,[langId]:true}));
    setEleganceScores(p=>({...p,[langId]:null}));
    try{const r=await refineCode(code,langId,mode,activeModel);setCodes(p=>({...p,[langId]:r}));addToast(`${langId} refined ✓`);}
    catch(e){addToast(`Refine failed: ${e.message}`,"error");}
    finally{setRefining(p=>({...p,[langId]:false}));}
  },[codes,addToast,activeModel]);

  const handleRefineAll=useCallback(async(mode)=>{
    setActiveMode(mode);
    setPrevCodes(Object.fromEntries(activeLangs.map(l=>[l,codes[l]])));
    setDiffMode({});
    setRefining(Object.fromEntries(activeLangs.map(l=>[l,true])));
    setEleganceScores({});
    await Promise.all(activeLangs.map(async langId=>{
      try{
        let code=codes[langId].trim()||PLACEHOLDERS[langId];
        if(!codes[langId].trim())setCodes(p=>({...p,[langId]:code}));
        const r=await refineCode(code,langId,mode,activeModel);setCodes(p=>({...p,[langId]:r}));
      }catch(e){addToast(`Refine ${langId} failed`,"error");}
      finally{setRefining(p=>({...p,[langId]:false}));}
    }));
    setActiveMode(null);addToast("All panels refined ✓");
  },[codes,activeLangs,addToast,activeModel]);

  const handleScoreAll=useCallback(async()=>{
    setScoring(Object.fromEntries(activeLangs.map(l=>[l,true])));
    setEleganceScores({});
    const scoreOne=async(langId)=>{
      let code=codes[langId].trim()||PLACEHOLDERS[langId];
      if(!codes[langId].trim())setCodes(p=>({...p,[langId]:code}));
      for(let a=0;a<=2;a++){
        try{const r=await scoreElegance(code,langId,activeModel);setEleganceScores(p=>({...p,[langId]:r}));return;}
        catch(e){if(a<2)await new Promise(r=>setTimeout(r,1000*(a+1)));else addToast(`Score ${langId} failed`,"error");}
      }
    };
    await Promise.all(activeLangs.map((langId,i)=>new Promise(r=>setTimeout(r,i*400)).then(()=>scoreOne(langId))));
    setScoring(Object.fromEntries(activeLangs.map(l=>[l,false])));
    addToast("Scoring complete ✓");
  },[codes,activeLangs,addToast,activeModel]);

  const handleExplain=useCallback(async(langId)=>{
    const code=codes[langId].trim()||PLACEHOLDERS[langId];
    if(!codes[langId].trim())setCodes(p=>({...p,[langId]:code}));
    setExplaining(p=>({...p,[langId]:true}));
    setExplanations(p=>({...p,[langId]:null}));
    setShowExplain(p=>({...p,[langId]:true}));
    try{const r=await explainCode(code,langId,activeModel);setExplanations(p=>({...p,[langId]:r}));}
    catch(e){setExplanations(p=>({...p,[langId]:`## Error\n${e.message}`}));addToast(`Explain failed`,"error");}
    finally{setExplaining(p=>({...p,[langId]:false}));}
  },[codes,addToast,activeModel]);

  const handleGenerate=useCallback(async(desc,selLangs)=>{
    setLoading(Object.fromEntries(selLangs.map(l=>[l,true])));
    setPrevCodes(p=>({...p,...Object.fromEntries(selLangs.map(l=>[l,codes[l]]))}));
    setEleganceScores({});
    await Promise.all(selLangs.map(async langId=>{
      try{const r=await generateCode(desc,langId,activeModel);setCodes(p=>({...p,[langId]:r}));}
      catch(e){addToast(`Generate ${langId} failed`,"error");}
      finally{setLoading(p=>({...p,[langId]:false}));}
    }));
    addToast(`Generated code for ${selLangs.length} language${selLangs.length>1?"s":""}!`);
  },[codes,addToast,activeModel]);

  const handleComment=useCallback(async(langId)=>{
    let code=codes[langId].trim()||PLACEHOLDERS[langId];
    if(!codes[langId].trim())setCodes(p=>({...p,[langId]:code}));
    setPrevCodes(p=>({...p,[langId]:code}));
    setDiffMode(p=>({...p,[langId]:false}));
    setRefining(p=>({...p,[langId]:true}));
    try{
      const r=await commentCode(code,langId,activeModel);
      setCodes(p=>({...p,[langId]:r}));
      addToast(`${langId} commented ✓`);
    }catch(e){addToast(`Comment failed: ${e.message}`,"error");}
    finally{setRefining(p=>({...p,[langId]:false}));}
  },[codes,addToast,activeModel]);

  const handleCopy=useCallback((langId)=>{
    navigator.clipboard.writeText(codes[langId]).then(()=>{
      setCopyState(p=>({...p,[langId]:true}));
      setTimeout(()=>setCopyState(p=>({...p,[langId]:false})),1200);
      addToast(`${langId} copied!`);
    });
  },[codes,addToast]);

  const toggleDiff=langId=>setDiffMode(p=>({...p,[langId]:!p[langId]}));

  if(appState==="setup")
    return <SetupScreen onComplete={(m)=>{setActiveModel(m);setAppState("app");}}/>;

  const visibleLangs=LANGUAGES.filter(l=>activeLangs.includes(l.id));
  const cols=visibleLangs.length;

  return(
    <div style={{height:"100vh",background:"#050508",fontFamily:"'JetBrains Mono',monospace",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <TitleBar model={activeModel}/>

      {/* HEADER */}
      <div style={{background:"#060610",borderBottom:"1px solid #111",padding:"6px 12px",display:"flex",alignItems:"center",gap:"8px",flexShrink:0,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(270deg,#4ec9f012,#ff336612,#f4a26112,#b97cf312)",backgroundSize:"400% 400%",animation:"shimmer 10s ease infinite",pointerEvents:"none"}}/>

        <div style={{display:"flex",alignItems:"center",gap:"8px",position:"relative",flexShrink:0}}>
          <div style={{fontSize:"16px",filter:"drop-shadow(0 0 8px #fff4)"}}>⟨/⟩</div>
          <div>
            <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:"13px",fontWeight:900,letterSpacing:"4px",background:"linear-gradient(90deg,#4ec9f0 0%,#ff6b9d 33%,#f4a261 66%,#b97cf3 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>POLYGLOT</h1>
            <p style={{fontSize:"6px",color:"#303050",letterSpacing:"3px"}}>8 LANGUAGES · LOCAL AI</p>
          </div>
        </div>

        <div style={{width:"1px",height:"22px",background:"#1a1a30",flexShrink:0}}/>

        {/* GENERATE button */}
        <button onClick={()=>setShowGenerator(true)} disabled={isGlobalBusy} style={{padding:"4px 11px",background:isGlobalBusy?"#0f0f1a":"linear-gradient(135deg,#7c3aed22,#4ec9f022)",border:`1px solid ${isGlobalBusy?"#1e1e30":"#7c3aed88"}`,borderRadius:"6px",color:isGlobalBusy?"#333":"#c4b5fd",fontSize:"10px",fontWeight:700,letterSpacing:"1px",cursor:isGlobalBusy?"not-allowed":"pointer",fontFamily:"'JetBrains Mono',monospace",display:"flex",alignItems:"center",gap:"5px",boxShadow:isGlobalBusy?"none":"0 0 12px #7c3aed33",transition:"all .15s"}}>
          <span>✦</span><span>GENERATE</span>
        </button>

        {/* Elegance modes */}
        <div style={{display:"flex",gap:"4px"}}>
          {ELEGANCE_MODES.map(m=>(
            <button key={m.id} className="mode-btn" onClick={()=>handleRefineAll(m.id)} disabled={isGlobalBusy} title={m.desc}
              style={{padding:"4px 9px",background:activeMode===m.id?`${m.color}33`:"#0f0f1a",border:`1px solid ${activeMode===m.id?m.color:"#1e1e30"}`,borderRadius:"6px",color:isGlobalBusy?"#333":m.color,fontSize:"9px",cursor:isGlobalBusy?"not-allowed":"pointer",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,display:"flex",alignItems:"center",gap:"4px",boxShadow:activeMode===m.id?`0 0 10px ${m.color}44`:"none"}}>
              <span>{m.icon}</span><span>{m.label}</span>
            </button>
          ))}
        </div>

        {/* Score */}
        <button className="score-btn" onClick={handleScoreAll} disabled={isGlobalBusy}
          style={{padding:"4px 11px",background:"linear-gradient(135deg,#7c3aed,#4f46e5)",border:"none",borderRadius:"6px",color:"#fff",fontSize:"9px",fontFamily:"'JetBrains Mono',monospace",fontWeight:700,cursor:isGlobalBusy?"not-allowed":"pointer",letterSpacing:"1px",boxShadow:"0 0 12px #7c3aed66",display:"flex",alignItems:"center",gap:"5px",opacity:isGlobalBusy?0.4:1}}>
          <span>🏆</span><span>SCORE</span>
        </button>

        <div style={{flex:1}}/>

        <div style={{fontSize:"7px",color:"#22c55e",letterSpacing:"1px",background:"#22c55e11",border:"1px solid #22c55e22",padding:"3px 8px",borderRadius:"4px",flexShrink:0}}>⬡ {activeModel}</div>

        {/* Language toggles */}
        <div style={{display:"flex",gap:"3px",flexWrap:"wrap",maxWidth:"560px"}}>
          {LANGUAGES.map(l=>{
            const active=activeLangs.includes(l.id);
            return(
              <button key={l.id} className="lang-toggle" onClick={()=>toggleLang(l.id)} title={active?`Hide ${l.label}`:`Show ${l.label}`}
                style={{padding:"3px 7px",background:active?l.bg:"#0a0a12",border:`1.5px solid ${active?l.primary:"#1a1a2a"}`,borderRadius:"5px",color:active?l.primary:"#333",fontSize:"8px",fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:"3px",boxShadow:active?`0 0 8px ${l.glow}55`:"none",opacity:active?1:0.4}}>
                <span>{l.icon}</span><span>{l.label.toUpperCase()}</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* COLUMNS */}
      <div style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,flex:1,overflow:"hidden",minHeight:0}}>
        {visibleLangs.map((lang,idx)=>{
          const isLoading=loading[lang.id],isRefining=refining[lang.id],isScoring=scoring[lang.id],isExplaining=explaining[lang.id];
          const busy=isLoading||isRefining||isScoring||isExplaining;
          const isSource=activeSource===lang.id,hasCode=codes[lang.id].trim().length>0;
          const canRun=!isGlobalBusy,lines=codes[lang.id]?codes[lang.id].split("\n").length:0,chars=codes[lang.id].length;
          const escore=eleganceScores[lang.id];
          const hasDiff=prevCodes[lang.id]&&codes[lang.id]&&prevCodes[lang.id]!==codes[lang.id];
          const showDiff=diffMode[lang.id]&&hasDiff,copied=copyState[lang.id],explainOpen=showExplain[lang.id];
          let added=0,removed=0;
          if(hasDiff){const d=computeDiff(prevCodes[lang.id],codes[lang.id]);added=d.filter(x=>x.type==="add").length;removed=d.filter(x=>x.type==="del").length;}

          return(
            <div key={lang.id} className={`lang-col panel-${lang.id}`}
              style={{display:"flex",flexDirection:"column",background:lang.panelBg,borderRight:idx<cols-1?`1px solid ${lang.border}`:"none",animationDelay:`${idx*80}ms`,position:"relative",overflow:"hidden",minHeight:0,height:"100%"}}>

              <div style={{position:"absolute",top:"-80px",left:"50%",transform:"translateX(-50%)",width:"280px",height:"280px",background:`radial-gradient(circle,${lang.glow} 0%,transparent 65%)`,opacity:isSource?0.5:busy?0.35:0.15,transition:"opacity .5s ease",pointerEvents:"none",zIndex:0,animation:busy?"gradientShift 2s ease infinite":"none"}}/>

              {/* PANEL HEADER */}
              <div style={{background:lang.headerBg,borderBottom:`2px solid ${lang.primary}44`,padding:"7px 10px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"5px",flexShrink:0,position:"relative",zIndex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:"7px",flexShrink:0}}>
                  <div style={{width:"26px",height:"26px",background:`radial-gradient(circle at 30% 30%,${lang.primary}44,${lang.bg})`,border:`1.5px solid ${lang.primary}55`,borderRadius:"7px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",boxShadow:`0 0 10px ${lang.glow}`,animation:isSource?"pulse 1.2s ease infinite":"none"}}>{lang.icon}</div>
                  <div>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:"10px",color:lang.primary,letterSpacing:"2px"}}>{lang.label.toUpperCase()}</div>
                    <div style={{fontSize:"7px",color:lang.dimText,letterSpacing:"1.5px",display:"flex",gap:"5px"}}>
                      <span>{hasCode?`${lines}L · ${chars}C`:"EMPTY"}</span>
                      {hasDiff&&<span><span style={{color:"#22c55e"}}>+{added}</span>{" "}<span style={{color:"#ef4444"}}>-{removed}</span></span>}
                    </div>
                  </div>
                </div>

                <div style={{display:"flex",gap:"3px",alignItems:"center",flexWrap:"wrap"}}>
                  {/* 🎓 Teacher mode */}
                  <button className="icon-btn"
                    onClick={()=>explainOpen?setShowExplain(p=>({...p,[lang.id]:false})):handleExplain(lang.id)}
                    title={explainOpen?"Close teacher mode":"Explain this code like a teacher"}
                    style={{border:`1px solid ${explainOpen?lang.primary:lang.border}`,borderRadius:"4px",color:explainOpen?lang.primary:lang.dimText,fontSize:"10px",padding:"3px 6px",background:explainOpen?`${lang.primary}18`:"transparent",fontFamily:"'JetBrains Mono',monospace"}}>
                    🎓{explainOpen?" ✕":""}
                  </button>

                  {hasDiff&&<button className="icon-btn" onClick={()=>toggleDiff(lang.id)} style={{border:`1px solid ${showDiff?lang.primary:lang.border}`,borderRadius:"4px",color:showDiff?lang.primary:lang.dimText,fontSize:"9px",padding:"3px 6px",background:showDiff?`${lang.primary}18`:"transparent",fontFamily:"'JetBrains Mono',monospace"}}>{showDiff?"≡ SRC":"± DIFF"}</button>}

                  <select value="" onChange={e=>{if(e.target.value)handleRefine(lang.id,e.target.value);}} disabled={isGlobalBusy}
                    style={{background:`${lang.bg}cc`,border:`1px solid ${lang.border}`,color:lang.dimText,fontSize:"9px",padding:"3px 4px",borderRadius:"4px",cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",outline:"none"}}>
                    <option value="">✦ refine…</option>
                    {ELEGANCE_MODES.map(m=><option key={m.id} value={m.id}>{m.icon} {m.label}</option>)}
                  </select>

                  {/* 💬 Comment button */}
                  <button className="icon-btn"
                    onClick={()=>handleComment(lang.id)}
                    disabled={isGlobalBusy}
                    title="Add comments to every line"
                    style={{border:`1px solid ${lang.border}`,borderRadius:"4px",color:isGlobalBusy?"#333":lang.dimText,fontSize:"9px",padding:"3px 6px",background:"transparent",fontFamily:"'JetBrains Mono',monospace",cursor:isGlobalBusy?"not-allowed":"pointer",letterSpacing:"0.5px"}}>
                    💬
                  </button>

                  {hasCode&&<button className={`icon-btn${copied?" copy-flash":""}`} onClick={()=>handleCopy(lang.id)} title="Copy" style={{border:`1px solid ${copied?"#22c55e55":lang.border}`,color:copied?"#22c55e":lang.dimText,fontSize:"11px",padding:"3px 6px",borderRadius:"4px"}}>{copied?"✓":"⎘"}</button>}

                  {hasDiff&&<button className="icon-btn" onClick={()=>{setCodes(p=>({...p,[lang.id]:prevCodes[lang.id]}));setPrevCodes(p=>{const n={...p};delete n[lang.id];return n;});setDiffMode(p=>({...p,[lang.id]:false}));addToast(`${lang.id} reverted`);}} style={{border:`1px solid ${lang.border}`,color:lang.dimText,fontSize:"10px",padding:"3px 6px",borderRadius:"4px"}}>↩</button>}

                  <button className="run-btn" onClick={()=>handleTranslate(lang.id)} disabled={!canRun}
                    style={{padding:"4px 10px",background:canRun?`linear-gradient(135deg,${lang.primary},${lang.secondary})`:`${lang.border}88`,border:"none",borderRadius:"5px",color:canRun?"#000":lang.dimText,fontSize:"9px",fontFamily:"'JetBrains Mono',monospace",fontWeight:700,cursor:canRun?"pointer":"not-allowed",letterSpacing:"1.5px",boxShadow:canRun?`0 0 14px ${lang.glow}`:"none"}}>
                    {isSource?"● RUN":"▶ RUN"}
                  </button>
                </div>
              </div>

              {/* EDITOR */}
              <div style={{flex:1,position:"relative",overflow:"hidden",zIndex:1,minHeight:0,display:"flex",flexDirection:"column"}}>
                {(isLoading||isRefining||isScoring)&&<LoadingOverlay lang={lang} label={isScoring?"SCORING":isRefining?"REFINING":"TRANSLATING"} sublabel={isRefining?(ELEGANCE_MODES.find(m=>m.id===activeMode)?.label||""):activeModel}/>}
                <CodeEditor lang={lang} value={codes[lang.id]} onChange={v=>{setCodes(p=>({...p,[lang.id]:v}));setEleganceScores(p=>({...p,[lang.id]:null}));}} placeholder={PLACEHOLDERS[lang.id]} diffBase={prevCodes[lang.id]} showDiff={showDiff}/>
                {explainOpen&&<ExplainPanel lang={lang} explanation={explanations[lang.id]} loading={isExplaining} onClose={()=>setShowExplain(p=>({...p,[lang.id]:false}))}/>}
              </div>

              <EleganceMeter score={escore?.score??null} lang={lang} label={escore?.label}/>

              {/* FOOTER */}
              <div style={{padding:"3px 10px",borderTop:`1px solid ${lang.border}`,background:`${lang.bg}cc`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,zIndex:1}}>
                <div style={{display:"flex",gap:"5px",alignItems:"center"}}>
                  <div style={{width:"5px",height:"5px",borderRadius:"50%",background:hasCode?lang.primary:lang.dimText,boxShadow:hasCode?`0 0 5px ${lang.glow}`:"none"}}/>
                  <span style={{fontSize:"7px",color:lang.dimText,letterSpacing:"1.5px"}}>{lang.id.toUpperCase()}</span>
                </div>
                {hasCode&&<button onClick={()=>{setCodes(p=>({...p,[lang.id]:""}));setEleganceScores(p=>({...p,[lang.id]:null}));setPrevCodes(p=>{const n={...p};delete n[lang.id];return n;});setDiffMode(p=>({...p,[lang.id]:false}));setShowExplain(p=>({...p,[lang.id]:false}));setExplanations(p=>({...p,[lang.id]:null}));}} style={{background:"none",border:"none",color:lang.dimText,fontSize:"7px",cursor:"pointer",letterSpacing:"1px",fontFamily:"'JetBrains Mono',monospace"}}>CLEAR ✕</button>}
              </div>
            </div>
          );
        })}
      </div>

      {showGenerator&&<GeneratorModal onClose={()=>setShowGenerator(false)} onGenerate={handleGenerate} activeLangs={activeLangs} model={activeModel}/>}
      <Toast toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
